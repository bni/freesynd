[settings]
os=Windows
arch=x86_64
build_type=Release
compiler=gcc
compiler.version=15
compiler.libcxx=libstdc++11
compiler.cppstd=20

[buildenv]
CC=/opt/local/bin/x86_64-w64-mingw32-gcc
CXX=/opt/local/bin/x86_64-w64-mingw32-g++
AR=/opt/local/bin/x86_64-w64-mingw32-ar
RANLIB=/opt/local/bin/x86_64-w64-mingw32-ranlib
STRIP=/opt/local/bin/x86_64-w64-mingw32-strip
RC=/opt/local/bin/x86_64-w64-mingw32-windres
